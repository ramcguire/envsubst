version: '3'

# pipefail ensures pipe errors propagate correctly on Unix.
# Task silently ignores shell options it cannot apply on the current platform.
set: [pipefail]

vars:
  # Override at the CLI: task docker:build IMAGE=myregistry/myimage
  IMAGE: envsubst

tasks:

  # ── Default ──────────────────────────────────────────────────────────────────

  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  # ── Rust ─────────────────────────────────────────────────────────────────────

  test:
    desc: Run tests
    cmds:
      - cargo test

  test:coverage:
    desc: Run tests with LLVM coverage and emit an HTML report under target/llvm-cov/
    cmds:
      - cargo llvm-cov --html

  lint:
    desc: Run all lints in parallel (Clippy + formatting check)
    deps: [lint:clippy, lint:fmt]

  lint:clippy:
    desc: Run Clippy — all warnings treated as errors
    cmds:
      - cargo clippy -- -D warnings

  lint:fmt:
    desc: Check that source is formatted (does not modify files)
    cmds:
      - cargo fmt --check

  fmt:
    desc: Auto-format all source files with rustfmt
    cmds:
      - cargo fmt

  build:
    desc: Debug build
    cmds:
      - cargo build

  build:release:
    desc: Release build
    cmds:
      - cargo build --release

  docker:build:
    desc: >
      Build one Docker variant for the current platform and load it into Docker.
      Defaults to the standard variant (static-debian12, distroless:latest).
      Override any combination at the CLI:
        task docker:build VARIANT=static-debian13 DISTROLESS_TAG=nonroot IMAGE_TAG=mytest
    vars:
      VARIANT:       "{{.VARIANT       | default \"static-debian12\"}}"
      DISTROLESS_TAG: "{{.DISTROLESS_TAG | default \"latest\"}}"
      IMAGE_TAG:     "{{.IMAGE_TAG     | default \"dev\"}}"
    cmds:
      - >-
        docker buildx build
        --build-arg DISTROLESS_VARIANT={{.VARIANT}}
        --build-arg DISTROLESS_TAG={{.DISTROLESS_TAG}}
        --tag {{.IMAGE}}:{{.IMAGE_TAG}}
        --load
        .

  docker:build:all:
    desc: >
      Build all four matrix variants for the current platform and load them
      into Docker. Produces: dev, dev-nonroot, dev-debian13, dev-debian13-nonroot.
    cmds:
      - task: _docker:variant
        vars: {VARIANT: static-debian12, DISTROLESS_TAG: latest,  IMAGE_TAG: dev}
      - task: _docker:variant
        vars: {VARIANT: static-debian12, DISTROLESS_TAG: nonroot, IMAGE_TAG: dev-nonroot}
      - task: _docker:variant
        vars: {VARIANT: static-debian13, DISTROLESS_TAG: latest,  IMAGE_TAG: dev-debian13}
      - task: _docker:variant
        vars: {VARIANT: static-debian13, DISTROLESS_TAG: nonroot, IMAGE_TAG: dev-debian13-nonroot}

  test:e2e:
    desc: >
      Build the default Docker variant and run e2e tests against it.
      Pass IMAGE=tag to skip the build and test an existing image instead.
    vars:
      IMAGE: "{{.IMAGE | default \"\"}}"
    cmds:
      - bash scripts/e2e.sh {{.IMAGE}}

  ci:
    desc: >
      Run the full CI pipeline locally: test → lint → docker build (all variants) → e2e.
      Mirrors the GitHub Actions workflow — same steps, current platform only
      (no multi-arch push). Requires Docker to be running.
    cmds:
      - task: test
      - task: lint
      - task: docker:build:all
      - task: test:e2e

  _docker:variant:
    internal: true
    cmds:
      - >-
        docker buildx build
        --build-arg DISTROLESS_VARIANT={{.VARIANT}}
        --build-arg DISTROLESS_TAG={{.DISTROLESS_TAG}}
        --tag {{.IMAGE}}:{{.IMAGE_TAG}}
        --load
        .
