name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --lcov --output-path coverage.lcov
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      # - uses: actions/upload-artifact@v6
      #   with:
      #     name: coverage
      #     path: coverage.lcov

  publish:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Default Debian12 variant
          - variant: static-debian12
            distroless_tag: latest
            tag_suffix: ""
            branch_tag: latest

          # Debian 12 + nonroot
          - variant: static-debian12
            distroless_tag: nonroot
            tag_suffix: "-nonroot"
            branch_tag: nonroot

          # Debian 13
          - variant: static-debian13
            distroless_tag: latest
            tag_suffix: "-debian13"
            branch_tag: debian13

          # Debian 13 + nonroot
          - variant: static-debian13
            distroless_tag: nonroot
            tag_suffix: "-debian13-nonroot"
            branch_tag: debian13-nonroot

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            # Disable auto-latest; we set it explicitly below via type=raw.
            latest=false
            # Appended to all semver and SHA tags (e.g. v0.1.0-nonroot, sha-abc-debian13).
            # type=raw tags override this with suffix= to produce clean floating names.
            suffix=${{ matrix.tag_suffix }}
          tags: |
            # Semver release tags — only generated on v* tag pushes
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

            # Per-commit SHA tag — generated on every push
            type=sha

            # Floating branch tag: latest / nonroot / debian13 / debian13-nonroot
            # suffix= overrides the global flavor suffix so the value is used verbatim
            type=raw,value=${{ matrix.branch_tag }},enable={{is_default_branch}},suffix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            DISTROLESS_VARIANT=${{ matrix.variant }}
            DISTROLESS_TAG=${{ matrix.distroless_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per matrix entry
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.distroless_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.distroless_tag }}
